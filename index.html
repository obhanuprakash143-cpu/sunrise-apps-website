    <!-- ============ INLINE CRITICAL STYLES (prevent flash) ============ -->
    <style>
        html,
        body {
            background: #050505;
            margin: 0;
            padding: 0;
        }

        #root {
            min-height: 100vh;
            background: #050505;
        }

        /* Loading spinner shown before React loads */
        .initial-loader {
            position: fixed;
            inset: 0;
            background: #050505;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            gap: 16px;
        }

        .initial-loader-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #ff6b35, #ffb800);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .initial-loader-text {
            color: rgba(255, 255, 255, 0.3);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(0.95);
                opacity: 0.8;
            }
        }
    </style>
</head>

<body>
    <!-- ============ INITIAL LOADER (disappears when React loads) ============ -->
    <div class="initial-loader" id="initial-loader">
        <div class="initial-loader-icon">🌅</div>
        <p class="initial-loader-text">Loading SunRise Apps...</p>
    </div>

    <!-- ============ REACT ROOT ============ -->
    <div id="root"></div>

    <!-- ============ HIDE LOADER WHEN REACT LOADS ============ -->
    <script>
        // Hide the initial loader once React has mounted
        window.addEventListener('load', function () {
            setTimeout(function () {
                var loader = document.getElementById('initial-loader');
                if (loader) {
                    loader.style.opacity = '0';
                    loader.style.transition = 'opacity 0.3s ease';
                    setTimeout(function () {
                        loader.style.display = 'none';
                    }, 300);
                }
            }, 500);
        });
    </script>

    <!-- ============ MAIN SCRIPT ============ -->
    <script type="module" src="/src/main.tsx"></script>
</body>
